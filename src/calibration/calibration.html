<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>ProxChat - Minimap Calibration</title>
  <link rel="stylesheet" href="calibration.css">
</head>
<body>
  <div id="frame">
    <div id="corner-tl" class="corner"></div>
    <div id="corner-tr" class="corner"></div>
    <div id="corner-bl" class="corner"></div>
    <div id="corner-br" class="corner"></div>
    <div id="edge-top" class="edge"></div>
    <div id="edge-bottom" class="edge"></div>
    <div id="edge-left" class="edge"></div>
    <div id="edge-right" class="edge"></div>
    <div id="controls">
      <button id="btn-confirm">OK</button>
      <button id="btn-close">X</button>
    </div>
  </div>
  <script src="calibration.js"></script>
</body>
</html>
